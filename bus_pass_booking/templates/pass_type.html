<!DOCTYPE html>
<html>
<head>
    <title>Pass Type</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var pass_name = document.getElementById("ddlPassName");
            var validity = document.getElementById("txtValidity");

            if (notEmpty(pass_name, "Please Enter pass type") &&
            isAlphabet(pass_name, "Please Enter only characters")&&
                notEmpty(validity, "Validity days required") &&
                isNumeric(validity, "Validity must be numeric")) {

                return true;
            }
            return false;
        }
    </script>
</head>

<body class="container mt-4">

<h2 class="mb-4">Pass Type Management</h2>

<form method="POST" action="/pass_type" class="card p-4 shadow">

    <div class="mb-3">
        <label>Pass Type ID (Cannot Change)</label>
        <input type="text"
               name="pass_type_id"
               class="form-control w-25"
               value="{{ pass_type_id }}"
               readonly>
    </div>

    <div class="mb-3">
        <label>Pass Name</label>
         <input type="text"
               name="pass_name"
                id="ddlPassName"
               class="form-control w-25"
               value="{{ pass_name }}"
         >
    </div>

    <div class="mb-3">
        <label>Validity Days</label>
        <input type="text"
               name="validity_days"
               id="txtValidity"
               class="form-control w-50"
               value="{{ validity_days }}"
               placeholder="Like 30 Days or 60 Days etc">
    </div>

    <div class="mt-3">
        <input type="submit" value="Insert"
               name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit" value="Update"
               name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit" value="Delete"
               name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if passtypelist %}
<hr>
<h4>Pass Type List</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Pass Name</th>
            <th>Validity (Days)</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in passtypelist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>
                <a href="/pass_type?pass_type_id={{ row[0] }}&pass_name={{ row[1] }}&validity_days={{ row[2] }}"
                   class="btn btn-outline-info btn-sm">
                    Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
