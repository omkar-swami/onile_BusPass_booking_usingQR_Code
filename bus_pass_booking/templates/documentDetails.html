<!DOCTYPE html>
<html>
<head>
    <title>Document Details</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var document = document.getElementById("ddlDocument");
            var documentType = document.getElementById("ddlDocumentType");
            var photo = document.getElementById("txtPhoto");

            if (madeSelection(document, "Please select Document ID") &&
                madeSelection(documentType, "Please select Document Type") &&
                notEmpty(photo, "Please enter Photo path")) {

                return true;
            }
            return false;
        }
    </script>
</head>

<body class="container mt-4">

<h2 class="mb-4">Document Details</h2>

<form method="POST" action="/documentDetails" class="card p-4 shadow">

    <div class="mb-3">
        <label>Document Detail ID</label>
        <input type="text"
               class="form-control w-25"
               name="documentDet_id"
               value="{{ documentDet_id }}"
               readonly>
    </div>

    <!-- Document ID Dropdown -->
    <div class="mb-3">
        <label>Document ID</label>
        <select name="document_id" id="ddlDocument" class="form-control w-50">
            <option>Please Choose</option>
            {% for row in documentlist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == document_id|string %} selected {% endif %}>
                    {{ row[0] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- Document Type Dropdown -->
    <div class="mb-3">
        <label>Document Type ID</label>
        <select name="document_type_id" id="ddlDocumentType" class="form-control w-50">
            <option>Please Choose</option>
            {% for row in documenttypelist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == document_type_id|string %} selected {% endif %}>
                    {{ row[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- Photo (Normal Text Input) -->
    <div class="mb-3">
        <label>Photo</label>
        <input type="text"
               name="photo"
               id="txtPhoto"
               class="form-control w-50"
               value="{{ photo }}">
    </div>

    <div class="mt-3">
        <input type="submit" value="Insert" name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit" value="Update" name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit" value="Delete" name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if documentdetailslist %}
<hr>

<h4>Document Details List</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>DocumentDet ID</th>
            <th>Document ID</th>
            <th>Document Type ID</th>
            <th>Photo</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in documentdetailslist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>
                <a href="/documentDetails?documentDet_id={{ row[0] }}&document_id={{ row[1] }}&document_type_id={{ row[2] }}&photo={{ row[3] }}"
                   class="btn btn-outline-info btn-sm">
                   Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endif %}

</body>
</html>
