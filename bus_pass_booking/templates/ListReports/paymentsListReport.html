<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

</head>
<body>
{% if paymentlist %}
<hr>

<h4>Payments List</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Payment ID</th>
            <th>Application ID</th>
            <th>Amount</th>
            <th>Payment Date</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in paymentlist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>
                <a href="/payments?payment_id={{ row[0] }}&application_id={{ row[1] }}&amount={{ row[2] }}&payment_date={{ row[3] }}"
                   class="btn btn-outline-info btn-sm">
                   Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endif %}
</body>
</html>
