<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

</head>
<body>
{% if passtypelist %}
<h4>Pass Type List Reports</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Pass Name</th>
            <th>Validity (Days)</th>

        </tr>
    </thead>
    <tbody>
        {% for row in passtypelist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>

        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}
</body>
</html>
