<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</head>
<body>
{% if applicationlist %}
<hr>
<h4>Application List</h4>

<table class="table table-bordered table-hover text-center">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User name </th>
            <th>Pass Type</th>
            <th>Route</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for row in applicationlist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] + " -> " + row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>

        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
