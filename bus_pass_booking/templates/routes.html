<!DOCTYPE html>
<html>
<head>
    <title>Routes</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var source = document.getElementById("txtSource");
            var destination = document.getElementById("txtDestination");
            var distance = document.getElementById("txtDistance");
            var price = document.getElementById("txtPrice");

            if (notEmpty(source, "Source required") &&
                isAlphabet(source, "Only letters allowed for source") &&
                notEmpty(destination, "Destination required") &&
                isAlphabet(destination, "Only letters allowed for destination") &&
                notEmpty(distance, "Distance required") &&
                isNumeric(distance, "Distance must be numeric") &&
                notEmpty(price, "Price required") &&
                isNumeric(price, "Price must be numeric")) {

                return true;
            }
            return false;
        }
    </script>
</head>

<body class="container mt-4">

<h2 class="mb-4">Route Management</h2>

<form method="POST" action="/routes" class="card p-4 shadow">

    <div class="mb-3">
        <label>Route ID (Cannot Change)</label>
        <input type="text"
               name="route_id"
               class="form-control w-25"
               value="{{ route_id }}"
               readonly>
    </div>

    <div class="mb-3">
        <label>Route Source</label>
        <input type="text"
               name="route_source"
               id="txtSource"
               class="form-control"
               value="{{ route_source }}">
    </div>

    <div class="mb-3">
        <label>Route Destination</label>
        <input type="text"
               name="route_destination"
               id="txtDestination"
               class="form-control"
               value="{{ route_destination }}">
    </div>

    <div class="mb-3">
        <label>Distance (KM)</label>
        <input type="text"
               name="distance_km"
               id="txtDistance"
               class="form-control"
               value="{{ distance_km | int }}">
    </div>

    <div class="mb-3">
        <label>Price Per KM</label>
        <input type="text"
               name="price_per_km"
               id="txtPrice"
               class="form-control"
               value="{{ price_per_km |int }}">
    </div>

    <div class="mt-3">
        <input type="submit" value="Insert"
               name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit" value="Update"
               name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit" value="Delete"
               name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if routelist %}
<hr>
<h4>Route List</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Distance</th>
            <th>Price/KM</th>
           
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in routelist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>

            <td>
                <a href="/routes?route_id={{ row[0] }}&route_source={{ row[1] }}&route_destination={{ row[2] }}&distance_km={{ row[3] }}&price_per_km={{ row[4] }}"
                   class="btn btn-outline-info btn-sm">
                    Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
