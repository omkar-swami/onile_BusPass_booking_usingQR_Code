<!DOCTYPE html>
<html>
<head>
    <title>Pass Discounts</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var user_type = document.getElementById("ddlUserType");
            var pass_type = document.getElementById("ddlPassType");
            var discount = document.getElementById("txtDiscount");

            if (madeSelection(user_type, "Select User Type") &&
                madeSelection(pass_type, "Select Pass Type") &&
                notEmpty(discount, "Discount required") &&
                isNumeric(discount, "Discount must be numeric")) {

                return true;
            }
            return false;
        }
    </script>
</head>

<body class="container mt-4">

<h2 class="mb-4">Pass Discount Management</h2>

<form method="POST" action="/pass_discounts" class="card p-4 shadow">

    <div class="mb-3">
        <label>Discount ID</label>
        <input type="text"
               name="discount_id"
               class="form-control w-25"
               value="{{ discount_id }}"
               readonly>
    </div>

    <div class="mb-3">
        <label>User Type</label>
        <select name="user_type_id"
                id="ddlUserType"
                class="form-select w-50">
            <option value="Please Choose">Please Choose</option>
            {% for row in usertypelist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == user_type_id|string %} selected {% endif %}>
                    {{ row[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Pass Type</label>
        <select name="pass_type_id"
                id="ddlPassType"
                class="form-select w-50">
            <option value="Please Choose">Please Choose</option>
            {% for row in passtypelist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == pass_type_id|string %} selected {% endif %}>
                    {{ row[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Discount Percentage</label>
        <input type="text"
               name="discount_percentage"
               id="txtDiscount"
               class="form-control w-50"
               value="{{ discount_percentage }}"
               placeholder="e.g. 10 or 25">
    </div>

    <div class="mt-3">
        <input type="submit" value="Insert"
               name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit" value="Update"
               name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit" value="Delete"
               name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if discountlist %}
<hr>
<h4>Discount List</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User Type ID</th>
            <th>Pass Type ID</th>
            <th>Discount %</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in discountlist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }} %</td>
            <td>
                <a href="/pass_discounts?discount_id={{ row[0] }}&user_type_id={{ row[1] }}&pass_type_id={{ row[2] }}&discount_percentage={{ row[3] }}"
                   class="btn btn-outline-info btn-sm">
                    Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
