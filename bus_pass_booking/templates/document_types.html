<!DOCTYPE html>
<html>
<head>
    <title>Document Type</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var document_name = document.getElementById("txtDocumentName");

            if (notEmpty(document_name, "Document Name must be given") &&
                isAlphabet(document_name, "Please enter only letters") &&
                lengthRestriction(document_name, 3, 30)) {

                return true;
            }
            return false;
        }
    </script>
</head>

<body class="container mt-4">

<h2 class="mb-4">Document Type Management</h2>

<form method="POST" action="/document_types" class="card p-4 shadow">

    <div class="mb-3">
        <label class="form-label">Document Type ID (Cannot Change)</label>
        <input type="text"
               class="form-control w-25"
               name="document_type_id"
               value="{{ document_type_id }}"
               readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Document Name</label>
        <input type="text"
               class="form-control w-50"
               name="document_name"
               id="txtDocumentName"
               value="{{ document_name }}"
               placeholder="Aadhar / PAN / College ID">
    </div>

    <div class="mt-3">
        <input type="submit"
               value="Insert"
               name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit"
               value="Update"
               name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit"
               value="Delete"
               name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if documentlist %}
<hr>

<h4>Document Type List</h4>

<table class="table table-bordered table-hover mt-3">
    <thead class="table-dark">
        <tr>
            <th>Document Type ID</th>
            <th>Document Name</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in documentlist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>
                <a href="/document_types?document_type_id={{ row[0] }}&document_name={{ row[1] }}"
                   class="btn btn-outline-info btn-sm">
                    Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endif %}

</body>
</html>
