<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uploaded Documents | Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--primary:linear-gradient(135deg,#6366f1,#4338ca);
--glass:rgba(255,255,255,0.85);
}

/* BODY */

body{
background:linear-gradient(135deg,#eef2ff,#f1f5f9);
font-family:'Inter',sans-serif;
min-height:100vh;
}


/* MAIN BACKGROUND CARD */

.main-wrapper{
max-width:1300px;
margin:60px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
margin-top:130px;
}


/* HEADER */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
border-bottom:1px solid #e2e8f0;
padding-bottom:15px;
}

.page-title{
font-size:1.9rem;
font-weight:800;
background:linear-gradient(90deg,#1e3a8a,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.back-btn{
background:white;
border:1px solid #e2e8f0;
padding:10px 20px;
border-radius:12px;
font-weight:600;
color:#4338ca;
transition:0.3s;
}

.back-btn:hover{
transform:translateX(-4px);
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}


/* DATE BADGE */

.date-badge{
display:inline-flex;
align-items:center;
gap:8px;
background:#eef2ff;
padding:8px 18px;
border-radius:50px;
font-weight:600;
font-size:14px;
color:#4f46e5;
margin-bottom:30px;
}


/* DOCUMENT CARD */

.doc-card{
background:var(--glass);
border-radius:18px;
padding:20px;
text-align:center;
border:1px solid #e2e8f0;
transition:0.4s;
height:100%;
}

.doc-card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}


/* DOCUMENT NAME */

.doc-name{
font-weight:700;
margin-bottom:15px;
color:#1e293b;
font-size:15px;
}


/* IMAGE BOX */

.img-box{
height:170px;
background:#f8fafc;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border:1px solid #e2e8f0;
}

.doc-img{
max-width:90%;
max-height:90%;
transition:0.4s;
}

.doc-card:hover .doc-img{
transform:scale(1.1);
}


/* BUTTON */

.view-btn{
margin-top:15px;
width:100%;
border:none;
background:var(--primary);
color:white;
padding:10px;
border-radius:10px;
font-weight:600;
transition:0.3s;
}

.view-btn:hover{
filter:brightness(1.1);
box-shadow:0 8px 20px rgba(99,102,241,0.4);
}


/* EMPTY */

.empty-box{
text-align:center;
padding:80px 20px;
}

.empty-icon{
font-size:60px;
color:#cbd5e1;
margin-bottom:20px;
}


/* MODAL */

.modal-content{
border-radius:20px;
border:none;
}

.modal-img{
width:100%;
border-radius:12px;
}

</style>
</head>

<body>

{% include 'Navbar.html' %}

<div class="main-wrapper">

<div class="page-header">

<h2 class="page-title">
<i class="fa-solid fa-cloud-arrow-up"></i> Uploaded Documents
</h2>

<button class="back-btn" onclick="window.location.href='/ApplicationRequest'">
<i class="fa-solid fa-arrow-left"></i> Return
</button>

</div>


{% if documentMaster %}

<div class="date-badge">
<i class="fa-regular fa-calendar"></i>
Uploaded : {{ documentMaster[0][2] }}
</div>


<div class="row g-4">

{% for row in doumentDetail %}

<div class="col-xl-3 col-lg-3 col-md-6">

<div class="doc-card">

<div class="doc-name">
{{row[3]}}
</div>

<div class="img-box">
<img class="doc-img"
src="{{ url_for('static', filename='Uploads/' + row[4]) }}">
</div>

<button class="view-btn"
data-bs-toggle="modal"
data-bs-target="#modal{{row[0]}}">

<i class="fa-solid fa-expand"></i> View
</button>

</div>

</div>


<!-- MODAL -->

<div class="modal fade" id="modal{{row[0]}}" tabindex="-1">

<div class="modal-dialog modal-lg modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">{{row[3]}}</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">
<img class="modal-img"
src="{{ url_for('static', filename='Uploads/' + row[4]) }}">
</div>

</div>
</div>
</div>

{% endfor %}

</div>


{% else %}

<div class="empty-box">

<div class="empty-icon">
<i class="fa-solid fa-folder-open"></i>
</div>

<h3>No Documents Found</h3>

<p class="text-muted">
No files attached to this application.
</p>

<button class="view-btn w-auto px-4"
onclick="window.location.href='/ApplicationRequest'">
Go Back
</button>

</div>

{% endif %}

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
