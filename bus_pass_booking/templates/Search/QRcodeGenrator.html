<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code</title>

<style>

/* BODY */
body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f1f5f9);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CONTAINER */
.QRCode-section{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
}

/* QR CARD */
.qr-card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    text-align:center;
    width:360px;
    transition:0.3s;
}

.qr-card:hover{
    transform:translateY(-5px);
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
}

/* TITLE */
.qr-title{
    font-size:24px;
    font-weight:700;
    color:#2563eb;
    margin-bottom:25px;
}

/* QR IMAGE */
.qr-img{
    width:240px;
    margin:20px 0;
    padding:10px;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* BUTTON CONTAINER */
.btn-group{
    margin-top:20px;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:12px 28px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
}

/* DOWNLOAD BUTTON */
.download-btn{
    background:linear-gradient(135deg,#10b981,#22c55e);
    color:white;
    box-shadow:0 5px 15px rgba(16,185,129,0.3);
}

.download-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(16,185,129,0.4);
}

/* PRINT STYLE */
@media print{

    body *{
        visibility:hidden;
    }

    .qr-card,
    .qr-card *{
        visibility:visible;
    }

    .qr-card{
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        box-shadow:none;
        border:none;
        background:none;
    }

    .qr-title{
        display:none;
    }

    .btn-group{
        display:none;
    }

    .qr-img{
        width:450px;
        height:450px;
    }

    @page{
        margin:0;
    }

}

</style>

</head>

<body>

{% include 'Navbar.html' %}

<div class="QRCode-section">

{% if file_nm %}

<div class="qr-card">

<div class="qr-title">Bus Pass QR Code</div>

<img id="qrImage" class="qr-img"
src="{{ url_for('static', filename='QRCodes/' + file_nm) }}">

<div class="btn-group">

<a class="btn download-btn"
href="{{ url_for('static', filename='QRCodes/' + file_nm) }}"
download>
⬇ Download QR Code
</a>

</div>

</div>

{% else %}

<div class="error">
Something went wrong
</div>

{% endif %}

</div>

</body>
</html>
