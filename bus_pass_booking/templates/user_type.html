<!DOCTYPE html>
<html>
<head>
    <title>User Type</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var type_name = document.getElementById("txtTypeName");

            if (notEmpty(type_name, "User Type Name must be given") &&
                isAlphabet(type_name, "Please enter only letters (Student / Employee / Normal)") &&
                lengthRestriction(type_name, 3, 20)) {

                return true;
            }
            return false;
        }
    </script>
    <style>
        body{
        margin-top:350px;
        }
    </style>
</head>

<body class="container">
{% include 'Navbar.html' %}
<h2 class="mb-4">User Type Management</h2>

<form method="POST" action="/user_type" class="card p-4 shadow">

    <div class="mb-3">
        <label class="form-label">User Type ID (Cannot Change)</label>
        <input type="text" class="form-control w-25"
               name="user_type_id"
               value="{{ user_type_id }}"
               readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Type Name</label>
        <input type="text"
               class="form-control w-50"
               name="type_name"
               id="txtTypeName"
               value="{{ type_name }}"
               placeholder="Student / Employee / Normal">
    </div>

    <div class="mt-3">
        <input type="submit"
               value="Insert"
               name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit"
               value="Update"
               name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit"
               value="Delete"
               name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if usertypelist %}
<hr>

<h4>User Type List</h4>

<table class="table table-bordered table-hover mt-3">
    <thead class="table-dark">
        <tr>
            <th>User Type ID</th>
            <th>Type Name</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in usertypelist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>
                <a href="/user_type?user_type_id={{ row[0] }}&type_name={{ row[1] }}"
                   class="btn btn-outline-info btn-sm">
                    Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endif %}

</body>
</html>
