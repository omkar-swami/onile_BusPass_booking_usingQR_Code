<!DOCTYPE html>
<html>
<head>
    <title>Applications</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ValidationLibrary.js') }}"></script>

    <script>
        function formValidator() {

            var user = document.getElementById("ddlUser");
            var pass = document.getElementById("ddlPassType");
            var route = document.getElementById("ddlRoute");
            var status = document.getElementById("ddlStatus");

            if (madeSelection(user, "Select User") &&
                madeSelection(pass, "Select Pass Type") &&
                madeSelection(route, "Select Route") &&
                madeSelection(status, "Select Status")) {

                return true;
            }
            return false;
        }
    </script>
</head>

<body class="container mt-4">

<h2 class="mb-4">Pass Applications</h2>

<form method="POST" action="/applications" class="card p-4 shadow">

    <div class="mb-3">
        <label>Application ID</label>
        <input type="text" name="application_id"
               class="form-control w-25"
               value="{{ application_id }}" readonly>
    </div>

    <div class="mb-3">
        <label>User</label>
        <select name="user_id" id="ddlUser" class="form-select">
            <option value="Please Choose">Please Choose</option>
            {% for row in userlist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == user_id|string %} selected {% endif %}>
                    {{ row[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Pass Type</label>
        <select name="pass_type_id" id="ddlPassType" class="form-select">
            <option value="Please Choose">Please Choose</option>
            {% for row in passtypelist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == pass_type_id|string %} selected {% endif %}>
                    {{ row[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Route</label>
        <select name="route_id" id="ddlRoute" class="form-select">
            <option value="Please Choose">Please Choose</option>
            {% for row in routelist %}
                <option value="{{ row[0] }}"
                {% if row[0]|string == route_id|string %} selected {% endif %}>
                    {{ row[1] }} → {{ row[2] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Status</label>
        <select name="status" id="ddlStatus" class="form-select">
            <option value="Please Choose">Please Choose</option>
            <option value="Pending" {% if status=="Pending" %} selected {% endif %}>Pending</option>
            <option value="Approved" {% if status=="Approved" %} selected {% endif %}>Approved</option>
            <option value="Rejected" {% if status=="Rejected" %} selected {% endif %}>Rejected</option>
            <option value="Under Process" {% if status=="Under Process" %} selected {% endif %}>Under Process</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Applied Date</label>
        <input type="date" name="applied_date"
               class="form-control w-50"
               value="{{ applied_date }}">
    </div>

    <div class="mt-3">
        <input type="submit" value="Insert"
               name="btn"
               class="btn btn-primary"
               onclick="return formValidator()"
               {% if is_record %} disabled {% endif %}>

        <input type="submit" value="Update"
               name="btn"
               class="btn btn-success"
               onclick="return formValidator()"
               {% if not is_record %} disabled {% endif %}>

        <input type="submit" value="Delete"
               name="btn"
               class="btn btn-danger"
               {% if not is_record %} disabled {% endif %}>
    </div>
</form>

{% if applicationlist %}
<hr>
<h4>Application List</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Pass Type</th>
            <th>Route</th>
            <th>Status</th>
            <th>Date</th>
            <th>Select</th>
        </tr>
    </thead>
    <tbody>
        {% for row in applicationlist %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>
                <a href="/applications?application_id={{ row[0] }}&user_id={{ row[1] }}&pass_type_id={{ row[2] }}&route_id={{ row[3] }}&status={{ row[4] }}&applied_date={{ row[5] }}"
                   class="btn btn-outline-info btn-sm">
                    Select
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
